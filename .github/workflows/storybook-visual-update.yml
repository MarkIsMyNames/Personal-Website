name: Update Visual Baselines

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.storybook/**'
      - 'storybook-tests/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook

      - name: Generate baseline snapshots
        run: |
          npm run serve-storybook &
          npx wait-on http://localhost:6006
          npm run test:storybook-visual:update

      - name: Commit updated snapshots
        run: |
          git config merge.ours.driver true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storybook-tests/__snapshots__/
          git diff --staged --quiet || git commit -m "chore: update visual regression baselines [skip ci]"
          git push

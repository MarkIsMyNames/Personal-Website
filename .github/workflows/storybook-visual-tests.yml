name: Storybook Visual Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '.storybook/**'
      - 'storybook-tests/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  storybook-visual-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook

      - name: Serve Storybook and run visual tests
        run: |
          npx serve storybook-static -p 6006 &
          npx wait-on http://localhost:6006
          npm run test:storybook-visual

      - name: Upload diff screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: test-results/
